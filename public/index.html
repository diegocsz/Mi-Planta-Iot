<!doctype html>
<html lang="es" class="h-full">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <title>Monitoreo de Planta</title>
    <style>
        :root {
            --mdb-evergreen: #001E2B;
            --mdb-forest: #00684A;
            --mdb-forest-deep: #023430;
            --mdb-spring: #00ED64;
            --mdb-spring-soft: #C3F4D7;
            --mdb-mist: #F9FBFA;
            --mdb-slate: #5C6C75;
            --mdb-line: #D8E5E1;
            --mdb-amber: #D9822B;
            --mdb-alert: #DB4437;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--mdb-mist); color: var(--mdb-evergreen); }
        .font-display { font-family: 'Fraunces', serif; }
        .font-mono { font-family: 'Space Mono', monospace; }
        [x-cloak] { display: none !important; }

        .leaf-texture {
            background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.06) 1px, transparent 0);
            background-size: 18px 18px;
        }

        .axis-label, .tick text { fill: var(--mdb-slate); font-family: 'Inter', sans-serif; font-size: 13px; }
        .grid line { stroke: var(--mdb-line); stroke-dasharray: 2,3; }
        .grid path { stroke-width: 0; }
        .domain { stroke: var(--mdb-line); }

        .pulse-dot { animation: pulse-glow 2.2s ease-in-out infinite; }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0, 237, 100, 0.5); }
            50% { box-shadow: 0 0 0 8px rgba(0, 237, 100, 0); }
        }

        .stat-card { transition: transform .25s ease, box-shadow .25s ease; }
        .stat-card:hover { transform: translateY(-2px); }
    </style>
</head>

<body class="h-full">
    <div x-data="plantaData()" class="min-h-screen">

        <!-- Encabezado -->
        <header class="leaf-texture" style="background-color: var(--mdb-evergreen);">
            <div class="max-w-7xl mx-auto px-8 py-7 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <!-- Logo: Aloe Vera -->
                    <svg width="52" height="52" viewBox="0 0 52 52" fill="none">
                        <g transform="translate(26,48)">
                            <path transform="rotate(-42)" d="M0,0 C-4,-16 -3,-30 0,-39 C3,-30 4,-16 0,0 Z" fill="var(--mdb-spring)" opacity="0.85" />
                            <path transform="rotate(-21)" d="M0,0 C-4,-18 -3,-34 0,-44 C3,-34 4,-18 0,0 Z" fill="var(--mdb-forest)" opacity="0.95" />
                            <path transform="rotate(0)" d="M0,0 C-4,-20 -3,-37 0,-47 C3,-37 4,-20 0,0 Z" fill="var(--mdb-spring)" />
                            <path transform="rotate(21)" d="M0,0 C-4,-18 -3,-34 0,-44 C3,-34 4,-18 0,0 Z" fill="var(--mdb-forest)" opacity="0.95" />
                            <path transform="rotate(42)" d="M0,0 C-4,-16 -3,-30 0,-39 C3,-30 4,-16 0,0 Z" fill="var(--mdb-spring)" opacity="0.85" />
                        </g>
                    </svg>
                    <div>
                        <h1 class="font-display text-3xl md:text-4xl text-white leading-none">Monitoreo de tu planta</h1>
                        <p class="text-sm mt-1.5" style="color: var(--mdb-spring-soft);">Lecturas de temperatura y humedad en tiempo real</p>
                    </div>
                </div>
                <div class="hidden sm:flex items-center gap-2 text-sm font-mono px-4 py-2 rounded-full"
                    style="background-color: rgba(0,237,100,0.12); color: var(--mdb-spring);">
                    <span class="w-2.5 h-2.5 rounded-full pulse-dot" style="background-color: var(--mdb-spring);"></span>
                    <span x-text="conectado ? 'EN VIVO' : 'SIN CONEXIÓN'"></span>
                </div>
            </div>
        </header>

        <!-- Contenido: info izquierda / gráfico derecha -->
        <main class="max-w-7xl mx-auto px-8 py-10">

            <!-- Estado de carga -->
            <div x-show="!estado" class="text-center py-24" style="color: var(--mdb-slate);">
                <p class="font-mono text-base">Cargando datos del sensor…</p>
            </div>

            <div x-show="estado" x-cloak class="grid grid-cols-1 lg:grid-cols-[420px_1fr] gap-8 items-start">

                <!-- Columna izquierda: info -->
                <div class="rounded-2xl overflow-hidden shadow-sm" style="background-color: var(--mdb-evergreen);">
                    <div class="p-8 leaf-texture">

                        <!-- Ilustración según tipo de planta -->
                        <div class="flex justify-center mb-5">
                            <svg x-show="esCactus" x-cloak width="140" height="150" viewBox="0 0 120 140">
                                <rect x="45" y="42" width="30" height="86" rx="15" fill="var(--mdb-forest)" />
                                <path d="M45 60 Q18 60 18 85 Q18 100 32 100 L40 100 L40 62 Z" fill="var(--mdb-forest)" opacity="0.95" />
                                <path d="M75 75 Q102 75 102 98 Q102 112 88 112 L80 112 L80 77 Z" fill="var(--mdb-forest)" opacity="0.95" />
                                <g stroke="var(--mdb-spring-soft)" stroke-width="1.4" opacity="0.8">
                                    <line x1="50" y1="50" x2="45" y2="46" /><line x1="60" y1="48" x2="60" y2="43" /><line x1="70" y1="50" x2="75" y2="46" />
                                    <line x1="50" y1="70" x2="45" y2="66" /><line x1="70" y1="70" x2="75" y2="66" />
                                    <line x1="50" y1="95" x2="45" y2="91" /><line x1="70" y1="95" x2="75" y2="91" />
                                    <line x1="24" y1="78" x2="19" y2="76" /><line x1="24" y1="90" x2="19" y2="90" />
                                    <line x1="96" y1="88" x2="101" y2="86" /><line x1="96" y1="100" x2="101" y2="100" />
                                </g>
                                <circle cx="60" cy="36" r="11" fill="#E8608A" />
                                <circle cx="60" cy="36" r="4" fill="#F5C242" />
                                <ellipse cx="60" cy="132" rx="34" ry="7" fill="var(--mdb-evergreen)" opacity="0.4" />
                            </svg>
                            <svg x-show="esPensamiento" x-cloak width="140" height="140" viewBox="0 0 120 120">
                                <g transform="translate(60,54)">
                                    <ellipse rx="24" ry="32" transform="rotate(0)" fill="#7C4DBE" />
                                    <ellipse rx="24" ry="32" transform="rotate(72)" fill="#9B6FD1" />
                                    <ellipse rx="24" ry="32" transform="rotate(144)" fill="#5E3897" />
                                    <ellipse rx="24" ry="32" transform="rotate(216)" fill="#F5C242" />
                                    <ellipse rx="24" ry="32" transform="rotate(288)" fill="#F0AA2E" />
                                    <circle r="10" fill="#3B2260" />
                                </g>
                                <rect x="56" y="86" width="8" height="30" rx="4" fill="var(--mdb-forest)" />
                                <path d="M60 96 Q40 96 34 108" stroke="var(--mdb-forest)" stroke-width="5" fill="none" stroke-linecap="round" />
                                <ellipse cx="30" cy="108" rx="10" ry="6" fill="var(--mdb-forest)" />
                            </svg>
                            <svg x-show="!esCactus && !esPensamiento" x-cloak width="140" height="140" viewBox="0 0 120 120">
                                <path d="M60 20C60 20 30 45 30 75C30 95 43 108 60 108C77 108 90 95 90 75C90 45 60 20 60 20Z" fill="var(--mdb-spring)" opacity="0.9" />
                                <path d="M60 30V102" stroke="var(--mdb-evergreen)" stroke-width="2" opacity="0.5" />
                            </svg>
                        </div>

                        <div class="flex items-start justify-between gap-3 mb-1">
                            <h2 class="font-display text-3xl text-white" x-text="estado?.nombre ?? '—'"></h2>
                        </div>
                        <p class="text-base mb-3" style="color: var(--mdb-spring-soft);">Dueño: <span x-text="estado?.duenio ?? '—'"></span></p>

                        <!-- Tipo de planta, bien visible -->
                        <span class="inline-block text-sm font-bold uppercase tracking-wider px-4 py-2 rounded-lg"
                            style="background-color: rgba(0,237,100,0.14); color: var(--mdb-spring); border: 1px solid rgba(0,237,100,0.3);"
                            x-text="estado?.tipo_planta ?? '—'"></span>

                        <div class="h-px my-6" style="background-color: rgba(255,255,255,0.1);"></div>

                        <!-- Badge de estado general -->
                        <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full mb-6"
                            :style="`background-color: ${estadoColor.bg}`">
                            <span class="w-2 h-2 rounded-full" :style="`background-color: ${estadoColor.dot}`"></span>
                            <span class="text-sm font-semibold" :style="`color: ${estadoColor.text}`" x-text="estado?.estado_general ?? '—'"></span>
                        </div>

                        <!-- Stats -->
                        <div class="grid grid-cols-2 gap-4">
                            <div class="stat-card rounded-xl p-5" style="background-color: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);">
                                <div class="flex items-center gap-2 mb-3">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--mdb-amber)" stroke-width="2">
                                        <path d="M14 4v10.5a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z" />
                                    </svg>
                                    <span class="text-xs uppercase tracking-wide font-semibold" style="color: var(--mdb-spring-soft);">Temp</span>
                                </div>
                                <p class="font-display text-4xl text-white" x-text="estado?.temp_actual != null ? `${parseFloat(estado.temp_actual).toFixed(1)}°` : '—'"></p>                            </div>
                            <div class="stat-card rounded-xl p-5" style="background-color: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);">
                                <div class="flex items-center gap-2 mb-3">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--mdb-spring)" stroke-width="2">
                                        <path d="M12 2s6 7 6 12a6 6 0 0 1-12 0c0-5 6-12 6-12Z" />
                                    </svg>
                                    <span class="text-xs uppercase tracking-wide font-semibold" style="color: var(--mdb-spring-soft);">Humedad</span>
                                </div>
                                <p class="font-display text-4xl text-white" x-text="estado?.hum_actual != null ? `${parseFloat(estado.hum_actual).toFixed(1)}%` : '—'"></p>                            </div>
                        </div>

                        <!-- Alerta -->
                        <div x-show="estado?.alertas" x-cloak class="mt-5 rounded-lg px-4 py-3 flex items-start gap-2"
                            style="background-color: rgba(219,68,55,0.12); border: 1px solid rgba(219,68,55,0.3);">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--mdb-alert)" stroke-width="2" class="mt-0.5 shrink-0">
                                <path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z" />
                            </svg>
                            <p class="text-sm font-medium" style="color: #FFC7BF;" x-text="estado?.alertas"></p>
                        </div>
                    </div>
                </div>

                <!-- Columna derecha: gráfico -->
                <div class="rounded-2xl bg-white shadow-sm p-8" style="border: 1px solid var(--mdb-line);">
                    <div class="flex flex-wrap items-center justify-between gap-3 mb-1">
                        <h2 class="font-display text-2xl">Historial de 20 lecturas</h2>
                        <div class="flex items-center gap-5 text-sm font-mono">
                            <span class="flex items-center gap-2"><span class="w-3 h-1 rounded" style="background-color: var(--mdb-amber);"></span>Temp (°C) · 0–56.7</span>
                            <span class="flex items-center gap-2"><span class="w-3 h-1 rounded" style="background-color: var(--mdb-forest);"></span>Humedad (%)</span>
                        </div>
                    </div>
                    <p class="text-sm mb-5" style="color: var(--mdb-slate);">Pasa el cursor sobre el gráfico para ver el detalle de cada lectura</p>
                    <div class="w-full overflow-x-auto">
                        <svg id="grafico" class="w-full" viewBox="0 0 720 380" style="min-width: 560px;"></svg>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        function plantaData() {
            return {
                estado: null,
                conectado: true,
                historial: [],

                get estadoColor() {
                    const s = (this.estado?.estado_general || '').toLowerCase();
                    if (s.includes('alerta') || s.includes('crític')) {
                        return { bg: 'rgba(219,68,55,0.15)', dot: 'var(--mdb-alert)', text: '#FFC7BF' };
                    }
                    if (s.includes('precau') || s.includes('atenci')) {
                        return { bg: 'rgba(217,130,43,0.15)', dot: 'var(--mdb-amber)', text: '#F4C78E' };
                    }
                    return { bg: 'rgba(0,237,100,0.15)', dot: 'var(--mdb-spring)', text: 'var(--mdb-spring)' };
                },

                get esCactus() {
                    return (this.estado?.tipo_planta || '').toLowerCase().includes('cact');
                },
                get esPensamiento() {
                    return (this.estado?.tipo_planta || '').toLowerCase().includes('pensa');
                },

                init() {
    const actualizarTodo = async () => {
        try {
            // Hacemos las peticiones en paralelo
            const [resEstado, resHistorial] = await Promise.all([
                fetch('/api/estado'),
                fetch('/api/registros')
            ]);

            if (resEstado.ok && resHistorial.ok) {
                const estadoData = await resEstado.json();
                const historialData = await resHistorial.json();

                // Asignamos datos reales
                this.estado = estadoData;
                this.historial = historialData;
                this.conectado = true;
                
                // Dibujamos con datos reales
                this.dibujarGrafico(this.historial);
            } else {
                // Si la respuesta no es OK, marcamos desconectado
                this.conectado = false;
                console.error("Error al obtener datos del servidor");
            }
        } catch (e) {
            // Si el servidor está caído, NO simulamos, solo marcamos error
            this.conectado = false;
            console.error("Servidor no disponible", e);
        }
    };

    actualizarTodo();
    setInterval(actualizarTodo, 5000);
},
                simular() {
                    if (this.historial.length === 0) {
                        let temp = 26, hum = 55;
                        this.historial = Array.from({ length: 20 }, () => {
                            temp += (Math.random() - 0.5) * 1.5;
                            hum += (Math.random() - 0.5) * 3;
                            return { temp: Math.max(15, Math.min(48, temp)), hum: Math.max(20, Math.min(90, hum)) };
                        });
                    } else {
                        const last = this.historial[this.historial.length - 1];
                        const temp = Math.max(15, Math.min(48, last.temp + (Math.random() - 0.5) * 1.5));
                        const hum = Math.max(20, Math.min(90, last.hum + (Math.random() - 0.5) * 3));
                        this.historial.push({ temp, hum });
                        this.historial.shift();
                    }
                    const last = this.historial[this.historial.length - 1];
                    const alerta = last.temp > 38 ? 'Temperatura elevada: revisa la exposición al sol' :
                        (last.hum < 30 ? 'Humedad baja: considera regar la planta' : '');
                    this.estado = {
                        nombre: 'Cactus del balcón',
                        duenio: 'Diego',
                        tipo_planta: 'Cactus',
                        temp_actual: last.temp,
                        hum_actual: last.hum,
                        estado_general: alerta ? 'Atención' : 'Saludable',
                        alertas: alerta
                    };
                },

                dibujarGrafico(data) {
                    if (!data || data.length === 0) return;

                    const margin = { top: 20, right: 56, bottom: 34, left: 50 };
                    const width = 720 - margin.left - margin.right;
                    const height = 380 - margin.top - margin.bottom;

                    const svg = d3.select('#grafico');
                    svg.selectAll('*').remove();

                    const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

                    const x = d3.scaleLinear().domain([0, data.length - 1]).range([0, width]);
                    const yHum = d3.scaleLinear().domain([0, 100]).range([height, 0]);
                    const yTemp = d3.scaleLinear().domain([0, 56.7]).range([height, 0]);

                    // Grid horizontal (referencia: eje de humedad)
                    g.append('g')
                        .attr('class', 'grid')
                        .call(d3.axisLeft(yHum).ticks(5).tickSize(-width).tickFormat(''));

                    // Ejes
                    g.append('g')
                        .attr('class', 'axis-y-hum')
                        .call(d3.axisLeft(yHum).ticks(5).tickFormat(d => `${d}%`));

                    g.append('g')
                        .attr('class', 'axis-y-temp')
                        .attr('transform', `translate(${width},0)`)
                        .call(d3.axisRight(yTemp).ticks(5).tickFormat(d => `${d}°`));

                    g.append('g')
                        .attr('transform', `translate(0,${height})`)
                        .call(d3.axisBottom(x).ticks(data.length > 10 ? 10 : data.length).tickFormat(d => `-${data.length - 1 - d}`));

                    // Degradados
                    const defs = svg.append('defs');
                    const gradHum = defs.append('linearGradient').attr('id', 'gradHum').attr('x1', '0').attr('y1', '0').attr('x2', '0').attr('y2', '1');
                    gradHum.append('stop').attr('offset', '0%').attr('stop-color', 'var(--mdb-spring)').attr('stop-opacity', 0.28);
                    gradHum.append('stop').attr('offset', '100%').attr('stop-color', 'var(--mdb-spring)').attr('stop-opacity', 0);

                    // Área bajo humedad
                    const areaHum = d3.area()
                        .x((d, i) => x(i))
                        .y0(height)
                        .y1(d => yHum(d.hum))
                        .curve(d3.curveMonotoneX);
                    g.append('path').datum(data).attr('d', areaHum).attr('fill', 'url(#gradHum)');

                    // Líneas
                    const lineaTemp = d3.line().x((d, i) => x(i)).y(d => yTemp(d.temp)).curve(d3.curveMonotoneX);
                    const lineaHum = d3.line().x((d, i) => x(i)).y(d => yHum(d.hum)).curve(d3.curveMonotoneX);

                    g.append('path').datum(data).attr('d', lineaTemp).attr('fill', 'none')
                        .attr('stroke', 'var(--mdb-amber)').attr('stroke-width', 3).attr('stroke-linecap', 'round');
                    g.append('path').datum(data).attr('d', lineaHum).attr('fill', 'none')
                        .attr('stroke', 'var(--mdb-forest)').attr('stroke-width', 3).attr('stroke-linecap', 'round');

                    // Puntos finales destacados
                    const last = data[data.length - 1];
                    g.append('circle').attr('cx', x(data.length - 1)).attr('cy', yTemp(last.temp)).attr('r', 5).attr('fill', 'var(--mdb-amber)').attr('stroke', 'white').attr('stroke-width', 2);
                    g.append('circle').attr('cx', x(data.length - 1)).attr('cy', yHum(last.hum)).attr('r', 5).attr('fill', 'var(--mdb-forest)').attr('stroke', 'white').attr('stroke-width', 2);

                    // Interacción: línea guía + tooltip
                    const focusLine = g.append('line').attr('y1', 0).attr('y2', height)
                        .attr('stroke', 'var(--mdb-line)').attr('stroke-width', 1).style('opacity', 0);
                    const focusTemp = g.append('circle').attr('r', 5).attr('fill', 'var(--mdb-amber)').attr('stroke', 'white').attr('stroke-width', 2).style('opacity', 0);
                    const focusHum = g.append('circle').attr('r', 5).attr('fill', 'var(--mdb-forest)').attr('stroke', 'white').attr('stroke-width', 2).style('opacity', 0);

                    const tooltip = d3.select('body').selectAll('.tooltip-planta').data([null]).join('div')
                        .attr('class', 'tooltip-planta')
                        .style('position', 'absolute')
                        .style('pointer-events', 'none')
                        .style('background', 'var(--mdb-evergreen)')
                        .style('color', 'white')
                        .style('font-family', 'Space Mono, monospace')
                        .style('font-size', '13px')
                        .style('padding', '8px 12px')
                        .style('border-radius', '6px')
                        .style('opacity', 0);

                    g.append('rect')
                        .attr('width', width).attr('height', height)
                        .attr('fill', 'transparent')
                        .on('mousemove', (event) => {
                            const [mx] = d3.pointer(event);
                            const i = Math.max(0, Math.min(data.length - 1, Math.round(x.invert(mx))));
                            const d = data[i];
                            focusLine.attr('x1', x(i)).attr('x2', x(i)).style('opacity', 1);
                            focusTemp.attr('cx', x(i)).attr('cy', yTemp(d.temp)).style('opacity', 1);
                            focusHum.attr('cx', x(i)).attr('cy', yHum(d.hum)).style('opacity', 1);
                            tooltip.style('opacity', 1)
                                .html(`Temp: ${d.temp.toFixed(1)}°C<br>Humedad: ${d.hum.toFixed(1)}%`)
                                .style('left', (event.pageX + 14) + 'px')
                                .style('top', (event.pageY - 10) + 'px');
                        })
                        .on('mouseleave', () => {
                            focusLine.style('opacity', 0);
                            focusTemp.style('opacity', 0);
                            focusHum.style('opacity', 0);
                            tooltip.style('opacity', 0);
                        });
                }
            }
        }
    </script>
</body>

</html>
